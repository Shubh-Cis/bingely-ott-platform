# nginx config for the frontend container. It does two jobs:
#   1) Serve the built React app (static files).
#   2) Proxy every /api/* request to the backend container ("api") so the
#      browser only ever talks to ONE origin → no CORS, and secrets stay server-side.
server {
  listen 80;
  server_name _;                       # match any hostname (EC2 IP or your domain)
  root /usr/share/nginx/html;          # where the built SPA lives (from the Dockerfile)
  index index.html;

  # Forward API + HLS-streaming calls to the backend service on the Docker network.
  # "api" is the service name in docker-compose; Docker DNS resolves it.
  location /api/ {
    proxy_pass http://api:4001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;           # long enough for video segment streaming
    client_max_body_size 50m;          # allow image uploads to pass through
  }

  # Single-Page-App routing: any unknown path returns index.html so React Router
  # can handle it (e.g. /title/xyz, /admin/titles).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
