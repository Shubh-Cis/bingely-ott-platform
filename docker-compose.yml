# Bingely — full production stack (run on the EC2 server):  docker compose up -d --build
#
#   client (nginx) ─80→ serves the React app + proxies /api → api
#   api (Express)        the backend on :4001 (internal)
#   worker               FFmpeg transcode worker (same image as api)
#   postgres             database (data persisted in the "pgdata" volume)
#
# The transcode queue is AWS SQS (configured via server/.env), so no Redis is
# needed.
#
# Secrets are read at runtime from server/.env (env_file) — they live on the
# server and are NEVER in git. Compose-level vars (Postgres creds, the Stripe
# PUBLISHABLE key) come from a root .env next to this file.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bingely}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bingely}
      POSTGRES_DB: ${POSTGRES_DB:-bingely}
    ports:
      # Bound to the server's localhost ONLY (not public). Connect from your
      # machine through an SSH tunnel to import your data manually.
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data   # data survives container restarts/redeploys
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bingely}"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build: ./server
    restart: unless-stopped
    # Just run the API. The database schema/data is managed MANUALLY by you
    # (import your own dump, or run `docker compose exec api npx prisma db push`
    # by hand when the schema changes). Nothing touches the DB automatically.
    command: node src/server.js
    env_file: ./server/.env               # JWT, AWS, Stripe SECRET keys, etc. (server-side only)
    environment:
      NODE_ENV: production
      # Point the app at the postgres CONTAINER (overrides DATABASE_URL in .env)
      DATABASE_URL: postgresql://${POSTGRES_USER:-bingely}:${POSTGRES_PASSWORD:-bingely}@postgres:5432/${POSTGRES_DB:-bingely}?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: ./server
    restart: unless-stopped
    command: node src/workers/transcode.worker.js
    env_file: ./server/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-bingely}:${POSTGRES_PASSWORD:-bingely}@postgres:5432/${POSTGRES_DB:-bingely}?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: ""                                  # relative /api → same origin (nginx proxies)
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}   # publishable (not secret), from root .env
    restart: unless-stopped
    ports:
      - "80:80"            # the public entry point: http://<your-ec2-ip>
    depends_on:
      - api

volumes:
  pgdata:
